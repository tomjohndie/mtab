name: Build and Push mtab Image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: 'tsxcw/mtab'
          ref: 'itushan'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✨ 终极修复：使用自动变量，让镜像名强行等于你的仓库名
      - name: Build and Push Docker Image
        run: |
          # 自动获取并转换用户名和当前仓库名为小写
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          # 这样打包出来的镜像名就绝对不会是“孤儿”了
          IMAGE_NAME="ghcr.io/$OWNER/$REPO:latest"
          
          echo "正在强行推送到当前仓库对应的镜像槽: $IMAGE_NAME"
          
          docker buildx build \
            --platform linux/amd64 \
            -t $IMAGE_NAME \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --push .
