name: Build and Push mtab Image

on:
  workflow_dispatch: # 允许你手动点击按钮触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. 登录到你的 GitHub 容器注册表 (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. 克隆目标的开源项目源码
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: 'tsxcw/mtab' # 目标仓库
          ref: 'master'           # 或者 'main'，取决于对方的主分支名

      # 3. 设置 Docker Buildx（用于加速和优化打包）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 构建镜像并直接推送到你的 GitHub 仓库
      - name: Build and Push Docker Image
        run: |
          # 转换用户名和仓库名为小写
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          # 这里的 mtab 可以换成你喜欢的镜像名字
          IMAGE_NAME="ghcr.io/$OWNER/mtab:latest"
          
          echo "开始构建并推送镜像到: $IMAGE_NAME"
          
          # 使用源码里的 Dockerfile 进行本地编译并直接 push
          docker buildx build --platform linux/amd64 -t $IMAGE_NAME --push .
