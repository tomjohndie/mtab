name: Build and Push mtab Image

on:
  workflow_dispatch: # 允许你手动点击按钮触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. 登录到你的 GitHub 容器注册表 (这次使用我们自己生成的超级 Token 登录)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }} # ✨ 换成了你的自定义超级密码

      # 2. 克隆目标的开源项目源码
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: 'tsxcw/mtab'
          ref: 'itushan'

      # 3. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 构建并推送镜像（完全写死你的用户名 tomjohndie）
      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME="ghcr.io/tomjohndie/mtab:latest"
          
          echo "开始强制推送到: $IMAGE_NAME"
          
          docker buildx build \
            --platform linux/amd64 \
            -t $IMAGE_NAME \
            --label "org.opencontainers.image.source=https://github.com/tomjohndie/mtab" \
            --push .
