name: Build and Push mtab Image

on:
  workflow_dispatch: # 允许你手动点击按钮触发

# ✨ 核心修复：显式声明此工作流拥有写入 Packages 的权限
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. 登录到你的 GitHub 容器注册表 (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. 克隆目标的开源项目源码
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: 'tsxcw/mtab'
          ref: 'itushan'

      # 3. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 构建并推送镜像
      - name: Build and Push Docker Image
        run: |
          # 转换用户名和仓库名为小写
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          IMAGE_NAME="ghcr.io/$OWNER/mtab:latest"
          
          echo "开始构建并推送镜像到: $IMAGE_NAME"
          
          # 使用源码里的 Dockerfile 进行本地编译并直接 push
          docker buildx build --platform linux/amd64 -t $IMAGE_NAME --push .
