name: Build and Push Uptime Kuma to GHCR

on:
  push:
    branches: [ "main" ] # 每次你推代码到 main 分支时触发
  workflow_dispatch: # 支持手动点击按钮触发

env:
  REGISTRY: ghcr.io
  # 镜像名字会变成 ghcr.io/你的github用户名/uptime-kuma
  IMAGE_NAME: ${{ github.repository }} 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone Official Uptime Kuma Source
        run: |
          # 1. 克隆官方源码
          git clone --depth 1 https://github.com/louislam/uptime-kuma.git kuma-src
          
          # 2. 复制 Dockerfile
          cp kuma-src/docker/dockerfile ./Dockerfile
          
          # 3. 只复制核心源码，不带入任何杂质文件
          cp -r kuma-src/src kuma-src/server kuma-src/public kuma-src/package.json kuma-src/package-lock.json ./
          # 如果官方源码里有 extra 或 db 目录，也顺便带上（保证依赖完整）
          [ -d kuma-src/extra ] && cp -r kuma-src/extra ./ || true
          [ -d kuma-src/db ] && cp -r kuma-src/db ./ || true

          # 4. 删掉那个折腾人的 .npmrc 复制命令
          sed -i '/\.npmrc/d' ./Dockerfile
          
          # 5. 【核心修复】在 npm ci 之前，强行插入切换国内淘宝镜像源的命令
          sed -i '/RUN npm ci/i RUN npm config set registry https://registry.npmmirror.com' ./Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # 针对一般服务器，打包 amd64 即可；如需兼容树莓派等可加上 linux/arm64
          platforms: linux/amd64 
