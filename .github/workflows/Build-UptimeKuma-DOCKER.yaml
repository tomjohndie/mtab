name: Build and Push Uptime Kuma to GHCR

on:
  push:
    branches: [ "main" ] # 每次你推代码到 main 分支时触发
  workflow_dispatch: # 支持手动点击按钮触发

env:
  REGISTRY: ghcr.io
  # 镜像名字会变成 ghcr.io/你的github用户名/uptime-kuma
  IMAGE_NAME: ${{ github.repository }} 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone Official Uptime Kuma Source
        run: |
          git clone --depth 1 https://github.com/louislam/uptime-kuma.git kuma-src
          # 把官方的 Dockerfile 提到根目录，方便打包
          cp kuma-src/docker/dockerfile ./Dockerfile
          cp -r kuma-src/* ./

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # 针对一般服务器，打包 amd64 即可；如需兼容树莓派等可加上 linux/arm64
          platforms: linux/amd64 
