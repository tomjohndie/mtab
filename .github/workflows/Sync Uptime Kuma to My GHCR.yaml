name: Sync Uptime Kuma to My GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sync-and-push:
    runs-on: ubuntu-latest
    
    # ====== 【关键修改：把 permissions 提到和 runs-on 平级】 ======
    permissions:
      contents: read
      packages: write
      id-token: write
    # ==========================================================

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, Retag, and Push Image
        run: |
          docker pull louislam/uptime-kuma:1
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="ghcr.io/${LOWERCASE_REPO}:latest"
          docker tag louislam/uptime-kuma:1 $IMAGE_TAG
          docker push $IMAGE_TAG
