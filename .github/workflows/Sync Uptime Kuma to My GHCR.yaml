name: Sync Uptime Kuma to My GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 支持手动点击按钮触发

jobs:
  sync-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write # 必须赋予写入 Packages 的权限

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, Retag, and Push Image
        run: |
          # 1. 直接拉取官方已经做好的、稳定无错的稳定版镜像
          docker pull louislam/uptime-kuma:1
          
          # 2. 将镜像名称转换为全小写（GitHub 规定镜像路径必须全小写，否则会报错）
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="ghcr.io/${LOWERCASE_REPO}:latest"
          
          # 3. 给官方镜像打上你自己的 GitHub 仓库标签
          docker tag louislam/uptime-kuma:1 $IMAGE_TAG
          
          # 4. 推送到你自己的 GitHub 仓库
          docker push $IMAGE_TAG
          
          echo "==== 恭喜！镜像已成功推送到你的专属仓库: $IMAGE_TAG ===="
